openapi: 3.0.2
info:
  title: "Test"
  version: "1.0"
security:
  - HeaderAuth: []
paths:
  /examples/HappyPath:
    get:
      operationId: happyPath
      security:
        - HeaderAuth: [ "foo" ]
        - HeaderAuth: [ "bar" ]
        - Jwt: [ ]
      responses:
        "307":
          description: 'Temporary redirect'
        "308":
          description: 'Permanent redirect'
        "200":
          description: OK

  /examples/HappyPathCreate:
    post:
      operationId: happyPathCreate
      responses:
        "201":
          description: OK

  /examples/JsonResponse:
    get:
      operationId: jsonResponse
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Main'

  /examples/TextResponse:
    get:
      operationId: textResponse
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string

  /examples/CsvResponse:
    get:
      operationId: csvResponse
      responses:
        "200":
          description: OK
          content:
            text/csv:
              schema:
                type: string

  /examples/HtmlResponse:
    get:
      operationId: htmlResponse
      responses:
        "200":
          description: OK
          content:
            text/html:
              schema:
                type: string

  /examples/ArrayResponse:
    get:
      operationId: arrayResponse
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Nest'

  /examples/MapResponse:
    get:
      operationId: mapResponse
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                x-go-type: "map[string]string"

  /examples/StreamResponse:
    get:
      operationId: streamResponse
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
                x-go-type: "io.Reader"

  /examples/HeaderResponse:
    get:
      operationId: headerResponse
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id:
              schema:
                type: string
            X-Total-Count:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Main'

  /examples/HeaderOnlyResponse:
    get:
      operationId: headerOnlyResponse
      responses:
        "204":
          description: No Content
          headers:
            X-Request-Id:
              schema:
                type: string

  /examples/NoContentResponse:
    get:
      operationId: noContentResponse
      responses:
        "204":
          description: No Content

  /examples/JsonBody:
    post:
      operationId: jsonBody
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Main'
      responses:
        "200":
          description: OK

  /examples/FormBody:
    post:
      operationId: formBody
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: OK

  /examples/MultipartBody:
    post:
      operationId: multipartBody
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK

  /examples/TextBody:
    post:
      operationId: textBody
      requestBody:
        content:
          text/plain:
            schema:
              type: string
      responses:
        "200":
          description: OK

  /examples/MultiBody:
    post:
      operationId: multiBody
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Main'
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK

  /examples/WithParams/{id}:
    parameters:
      - name: shared
        in: query
        schema:
          type: string
    get:
      operationId: withParams
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: filter
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum:
              - active
              - inactive
        - name: tags
          in: query
          schema:
            type: array
            items:
              type: string
              enum:
                - tag1
                - tag2
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: mapParam
          in: query
          schema:
            type: object
            additionalProperties:
              type: string
            x-go-type: "map[string]string"
      responses:
        "200":
          description: OK

  /examples/SimpleAuth:
    get:
      operationId: simpleAuth
      security:
        - HeaderAuth: []
      responses:
        "200":
          description: OK

  /examples/NoAuth:
    get:
      operationId: noAuth
      security: []
      responses:
        "200":
          description: OK

  /examples/ComplexAuth:
    get:
      operationId: complexAuth
      security:
        - HeaderAuth: [ "read" ]
        - Jwt: [ "admin" ]
      responses:
        "200":
          description: OK

  /examples/PublicWithOptionalAuth:
    get:
      operationId: publicWithOptionalAuth
      security:
        - {}
        - HeaderAuth: []
      responses:
        "200":
          description: OK

  /examples/RawOp:
    get:
      operationId: rawOp
      x-raw-request: true
      x-raw-response: true
      x-raw-body: true
      x-raw-auth: true
      responses:
        "200":
          description: OK

  /examples/JsonlResponse:
    get:
      operationId: jsonlResponse
      responses:
        "200":
          description: OK
          content:
            application/jsonl:
              schema:
                $ref: '#/components/schemas/Main'

components:
  securitySchemes:
    HeaderAuth:
      type: apiKey
      in: header
      name: X-API-Key
    Jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
    BasicAuth:
      type: http
      scheme: basic

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer

  schemas:
    MapTest:
      type: object
      properties:
        page:
          type: integer
      x-go-type: "*github.com/google/uuid.UUID"

    PtrToString:
      type: string
      x-go-type: "*foo.Bar"

    Nada: {}

    Foo:
      properties:
        bad:
          type: string
          x-go-type:
            foo: bar

    EmptyObject:
      type: object

    EmptyAlias:
      type: object

    Nest:
      type: object
      properties:
        id:
          type: integer
          format: int64
        label:
          type: string
          x-go-type: "*string"

    Main:
      type: object
      required:
        - page
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
          format: int32
        override_name:
          type: string
        list:
          type: array
          items:
            $ref: '#/components/schemas/Nest'

    Complex:
      allOf:
        - type: object
          required:
            - id
          properties:
            id:
              type: string
            status:
              type: string
              enum:
                - first
                - second
                - third
            nests:
              type: array
              items:
                $ref: '#/components/schemas/Nest'
            main:
              $ref: '#/components/schemas/Main'
        - $ref: '#/components/schemas/Main'

    Validated:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[a-zA-Z]+$"
        age:
          type: integer
          minimum: 0
          maximum: 150
        score:
          type: number
          multipleOf: 0.5
        tags:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: string

    WithDefaults:
      type: object
      properties:
        name:
          type: string
          default: "unnamed"
        count:
          type: integer
          default: 0

    EnumSchema:
      type: string
      enum:
        - alpha
        - beta
        - gamma

    BinaryField:
      type: object
      properties:
        upload:
          type: string
          format: binary

    InlineObject:
      type: object
      properties:
        nested:
          type: object
          properties:
            field:
              type: string

    ArrayOfObjects:
      type: array
      items:
        type: object
        properties:
          name:
            type: string

    ArrayOfRefs:
      type: array
      items:
        $ref: '#/components/schemas/Nest'

    WithAnyOf:
      anyOf:
        - type: object
          required:
            - name
          properties:
            name:
              type: string
        - type: object
          required:
            - name
          properties:
            name:
              type: string
            age:
              type: integer

    WithOneOf:
      oneOf:
        - type: object
          required:
            - id
          properties:
            id:
              type: string
        - type: object
          required:
            - id
          properties:
            id:
              type: string
            label:
              type: string

    EnumArray:
      type: object
      properties:
        statuses:
          type: array
          items:
            type: string
            enum:
              - on
              - off